<div class="inscription-container">
  <div class="inscription-card">
    <h1>ASKIA assurances</h1>
    <p class="sous-titre">Créer un compte client</p>

    <form (ngSubmit)="sInscrire()">
      <label for="nom">Nom complet</label>
      <input id="nom" type="text" name="nom" [(ngModel)]="nom" required placeholder="Votre nom" />

      <label for="email">Email</label>
      <input id="email" type="email" name="email" [(ngModel)]="email" required placeholder="vous@exemple.com" />

      <label for="motDePasse">Mot de passe</label>
      <input id="motDePasse" type="password" name="motDePasse" [(ngModel)]="motDePasse" required placeholder="6 caractères minimum" />

      <label for="telephone">Téléphone</label>
      <input id="telephone" type="tel" name="telephone" [(ngModel)]="telephone" required placeholder="77 123 45 67" />

      <label for="adresse">Adresse</label>
      <input id="adresse" type="text" name="adresse" [(ngModel)]="adresse" required placeholder="Dakar, Sénégal" />

      <p class="erreur" *ngIf="erreur">{{ erreur }}</p>

      <button type="submit" [disabled]="chargement">
        {{ chargement ? 'Création du compte...' : 'Créer mon compte' }}
      </button>
    </form>

    <p class="lien-connexion">
      Déjà un compte ? <a routerLink="/connexion">Se connecter</a>
    </p>
  </div>
</div>
