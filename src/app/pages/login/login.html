<div class="login-container">
  <div class="login-card">
    <h1>ASKIA assurances</h1>
    <p class="sous-titre">Connexion à votre espace</p>

    <form (ngSubmit)="seConnecter()">
      <label for="email">Email</label>
      <input
        id="email"
        type="email"
        name="email"
        [(ngModel)]="email"
        required
        placeholder="vous@exemple.com"
      />

      <label for="motDePasse">Mot de passe</label>
      <input
        id="motDePasse"
        type="password"
        name="motDePasse"
        [(ngModel)]="motDePasse"
        required
        placeholder="••••••••"
      />

      <p class="erreur" *ngIf="erreur">{{ erreur }}</p>

      <button type="submit" [disabled]="chargement">
        {{ chargement ? 'Connexion...' : 'Se connecter' }}
      </button>
    </form>

    <p class="lien-inscription">
      Pas encore de compte ? <a routerLink="/inscription">Créer un compte</a>
    </p>
  </div>
</div>
